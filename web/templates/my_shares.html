{{define "my_shares"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的分享 - NDisk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.__ACCESS_TOKEN__ = "{{.accessToken}}";</script>
    <script src="/static/js/app.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<div class="min-h-screen">
    <!-- 顶部导航 -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-xl font-bold text-gray-800">NDisk 我的分享</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/files" class="text-gray-600 hover:text-blue-600 font-medium">文件管理</a>
                    <a href="/share" class="text-blue-600 hover:text-blue-800 font-medium">我的分享</a>
                    <a href="/nfs" class="text-gray-600 hover:text-blue-600 font-medium">NFS 挂载</a>
                    <span class="text-gray-400">|</span>
                    <span class="text-gray-600">欢迎，{{.username}}</span>
                    <button onclick="logout()" class="text-red-600 hover:text-red-800">退出登录</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- 消息提示 -->
        <div id="message" class="hidden mb-4 p-3 rounded-md"></div>

        <!-- 分享列表 -->
        <div class="bg-white rounded-lg shadow">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">项目名称</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">文件/文件夹</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">密码保护</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">有效期至</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200" id="share-list">
                    <!-- 动态加载 -->
                </tbody>
            </table>
        </div>

        <!-- 空状态 -->
        <div id="empty-state" class="hidden text-center py-12">
            <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
            </svg>
            <h3 class="mt-2 text-sm font-medium text-gray-900">暂无分享</h3>
            <p class="mt-1 text-sm text-gray-500">去文件管理中分享文件或文件夹吧</p>
            <div class="mt-6">
                <a href="/files" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
                    前往文件管理
                </a>
            </div>
        </div>
    </main>
</div>

<!-- 加载中提示 -->
<div id="loading-state" class="text-center py-12">
    <p class="text-gray-500">加载中...</p>
</div>

<script>
    // 页面加载时获取分享列表
    document.addEventListener('DOMContentLoaded', function() {
        loadShares();
    });

    function loadShares() {
        authFetch('/api/shares').then(function(response) {
            return response.json();
        }).then(function(data) {
            document.getElementById('loading-state').classList.add('hidden');
            if (data.shares && data.shares.length > 0) {
                renderShares(data.shares);
            } else {
                document.getElementById('empty-state').classList.remove('hidden');
            }
        }).catch(function(err) {
            document.getElementById('loading-state').classList.add('hidden');
            showMessage('加载分享列表失败', true);
        });
    }

    function renderShares(shares) {
        var tbody = document.getElementById('share-list');
        tbody.innerHTML = '';

        shares.forEach(function(s) {
            var tr = document.createElement('tr');
            tr.className = 'hover:bg-gray-50';
            tr.id = 'share-row-' + s.id;

            // 项目名称
            var tdName = document.createElement('td');
            tdName.className = 'px-6 py-4 whitespace-nowrap';
            tdName.innerHTML = '<span class="text-gray-900 font-medium">' + escapeHtml(s.project_name) + '</span>';
            tr.appendChild(tdName);

            // 文件/文件夹名
            var tdItem = document.createElement('td');
            tdItem.className = 'px-6 py-4 whitespace-nowrap';
            var itemIcon = s.is_folder
                ? '<svg class="h-5 w-5 text-yellow-500 inline-block mr-1" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/></svg>'
                : '<svg class="h-5 w-5 text-gray-400 inline-block mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/></svg>';
            tdItem.innerHTML = itemIcon + '<span class="text-gray-700">' + escapeHtml(s.item_name) + '</span>';
            tr.appendChild(tdItem);

            // 类型
            var tdType = document.createElement('td');
            tdType.className = 'px-6 py-4 whitespace-nowrap';
            tdType.innerHTML = s.is_folder
                ? '<span class="px-2 py-1 text-xs font-medium rounded bg-yellow-100 text-yellow-800">文件夹</span>'
                : '<span class="px-2 py-1 text-xs font-medium rounded bg-blue-100 text-blue-800">文件</span>';
            tr.appendChild(tdType);

            // 密码保护
            var tdPwd = document.createElement('td');
            tdPwd.className = 'px-6 py-4 whitespace-nowrap';
            tdPwd.innerHTML = s.has_password
                ? '<span class="text-green-600 text-sm">是</span>'
                : '<span class="text-gray-400 text-sm">否</span>';
            tr.appendChild(tdPwd);

            // 有效期
            var tdExpires = document.createElement('td');
            tdExpires.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
            tdExpires.textContent = s.expires_at || '永久';
            tr.appendChild(tdExpires);

            // 创建时间
            var tdCreated = document.createElement('td');
            tdCreated.className = 'px-6 py-4 whitespace-nowrap text-sm text-gray-500';
            tdCreated.textContent = s.created_at;
            tr.appendChild(tdCreated);

            // 操作
            var tdActions = document.createElement('td');
            tdActions.className = 'px-6 py-4 whitespace-nowrap';
            tdActions.innerHTML = '<div class="flex items-center space-x-3">'
                + '<button onclick="copyMyShareLink(\'' + s.share_token + '\')" class="text-blue-600 hover:text-blue-800 text-sm">复制链接</button>'
                + '<button onclick="deleteShare(' + s.id + ')" class="text-red-600 hover:text-red-800 text-sm">删除</button>'
                + '</div>';
            tr.appendChild(tdActions);

            tbody.appendChild(tr);
        });
    }

    function escapeHtml(text) {
        var div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function copyMyShareLink(token) {
        var link = window.location.origin + '/s/' + token;
        navigator.clipboard.writeText(link).then(function() {
            showMessage('链接已复制到剪贴板');
        }).catch(function() {
            // 降级方案
            var input = document.createElement('input');
            input.value = link;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showMessage('链接已复制到剪贴板');
        });
    }

    function deleteShare(id) {
        if (!confirm('确定要删除此分享吗？删除后他人将无法通过该链接访问。')) return;

        authFetch('/api/shares/' + id, { method: 'DELETE' }).then(function(response) {
            return response.json();
        }).then(function(data) {
            if (data.message) {
                showMessage('分享已删除');
                // 移除对应行
                var row = document.getElementById('share-row-' + id);
                if (row) row.remove();
                // 检查是否为空
                var tbody = document.getElementById('share-list');
                if (tbody.children.length === 0) {
                    document.getElementById('empty-state').classList.remove('hidden');
                }
            } else {
                showMessage(data.error || '删除失败', true);
            }
        }).catch(function() {
            showMessage('网络错误，请重试', true);
        });
    }
</script>
</body>
</html>
{{end}}
