{{define "profile"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>个人资料 - NDisk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        },
                    }
                }
            }
        }
    </script>
    <script>window.__ACCESS_TOKEN__ = "{{.accessToken}}";</script>
    <script src="/static/js/app.js"></script>
    <style>
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        * { font-family: 'Nunito', sans-serif; }

        .focus-ring:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .btn-bounce {
            transition: transform 0.15s ease;
        }
        .btn-bounce:hover {
            transform: scale(1.02);
        }
        .btn-bounce:active {
            transform: scale(0.98);
        }

        .dot-pattern {
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex flex-col">
        <div class="fixed inset-0 dot-pattern pointer-events-none -z-10 opacity-50"></div>

        <!-- 顶部导航 -->
        <nav class="bg-white border-b-2 border-gray-100 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center shadow-md">
                            <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <h1 class="text-xl font-extrabold text-gray-900">NDisk</h1>
                        <span class="hidden sm:inline-block px-2.5 py-0.5 bg-green-100 text-green-700 text-xs font-bold rounded-full">个人资料</span>
                    </div>
                    <div class="flex items-center gap-1 sm:gap-2">
                        <a href="/files" class="px-3 py-2 text-sm font-semibold text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors focus-ring">文件管理</a>
                        <a href="/share" class="px-3 py-2 text-sm font-semibold text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors focus-ring">我的分享</a>
                        <a href="/nfs" class="px-3 py-2 text-sm font-semibold text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors focus-ring">NFS</a>
                        <div class="w-px h-6 bg-gray-200 mx-1 hidden sm:block" aria-hidden="true"></div>
                        <a href="/profile" class="px-3 py-2 text-sm font-bold text-blue-600 bg-blue-50 rounded-lg focus-ring" aria-current="page">{{.nickname}}</a>
                        <button onclick="logout()" class="px-3 py-2 text-sm font-semibold text-red-600 hover:bg-red-50 rounded-lg transition-colors focus-ring" aria-label="退出登录">退出</button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="flex-1 max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
            <div class="mb-8">
                <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900">个人资料 👤</h2>
                <p class="mt-1 text-gray-500 font-medium">管理你的账号信息</p>
            </div>

            <!-- 消息提示 -->
            <div id="message" class="hidden mb-6 p-4 rounded-xl font-semibold" role="alert" aria-live="polite"></div>

            <div class="bg-white rounded-2xl shadow-lg border-2 border-gray-100 p-6 sm:p-8">
                <form id="profile-form">
                    <!-- 用户名（只读） -->
                    <div class="mb-6">
                        <label class="block text-sm font-bold text-gray-700 mb-2">用户名</label>
                        <input type="text" value="{{.username}}" readonly
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl bg-gray-50 text-gray-500 font-medium cursor-not-allowed">
                        <p class="mt-1.5 text-xs text-gray-400">用户名不可修改，用于登录和系统标识</p>
                    </div>

                    <!-- 昵称（可编辑） -->
                    <div class="mb-6">
                        <label for="nickname" class="block text-sm font-bold text-gray-700 mb-2">昵称</label>
                        <input type="text" id="nickname" name="nickname" value="{{.nickname}}" required maxlength="64"
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:border-blue-400 focus:ring-0 transition-colors font-medium text-gray-900 placeholder-gray-400 focus-ring"
                            placeholder="请输入昵称…">
                        <p class="mt-1.5 text-xs text-gray-400">昵称支持任意字符，1-64 个字符，将显示在界面中</p>
                    </div>

                    <div class="flex justify-end gap-3">
                        <a href="/files" class="px-5 py-2.5 text-sm font-bold text-gray-700 bg-white border-2 border-gray-200 rounded-xl hover:bg-gray-50 transition-colors focus-ring">返回</a>
                        <button type="submit"
                            class="px-5 py-2.5 text-sm font-bold text-white bg-gradient-to-r from-blue-500 to-purple-500 rounded-xl hover:shadow-lg transition-all btn-bounce focus-ring">保存修改</button>
                    </div>
                </form>
            </div>
        </main>

        <footer class="py-6 text-center border-t border-gray-200 bg-white mt-auto">
            <p class="text-sm text-gray-500 font-medium">NDisk · 安全便捷的文件分享服务</p>
        </footer>
    </div>

    <script>
        document.getElementById('profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            var nickname = document.getElementById('nickname').value.trim();
            if (!nickname || nickname.length > 64) {
                showMessage('昵称长度需要在 1-64 个字符之间', 'error');
                return;
            }

            try {
                var response = await authFetch('/api/auth/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname: nickname }),
                });
                var data = await response.json();
                if (response.ok) {
                    showMessage('昵称修改成功', 'success');
                } else {
                    showMessage(data.error || '修改失败', 'error');
                }
            } catch (err) {
                showMessage('网络错误，请重试', 'error');
            }
        });

        function showMessage(text, type) {
            var el = document.getElementById('message');
            el.textContent = text;
            el.className = 'mb-6 p-4 rounded-xl font-semibold';
            if (type === 'success') {
                el.classList.add('bg-green-100', 'text-green-800', 'border-2', 'border-green-200');
            } else if (type === 'error') {
                el.classList.add('bg-red-100', 'text-red-800', 'border-2', 'border-red-200');
            } else {
                el.classList.add('bg-blue-100', 'text-blue-800', 'border-2', 'border-blue-200');
            }
            el.classList.remove('hidden');
            setTimeout(function() { el.classList.add('hidden'); }, 3000);
        }
    </script>
</body>
</html>
{{end}}
