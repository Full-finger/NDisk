{{define "register"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ffffff">
    <title>注册 - NDisk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Nunito', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="/static/js/app.js"></script>
    <style>
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        * { font-family: 'Nunito', sans-serif; }

        .focus-ring:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .btn-bounce {
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .btn-bounce:hover {
            transform: scale(1.01);
            box-shadow: 0 8px 25px -5px rgba(59, 130, 246, 0.4);
        }
        .btn-bounce:active {
            transform: scale(0.99);
        }

        .float-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.5;
            animation: floatOrb 8s ease-in-out infinite;
        }
        .float-orb:nth-child(2) { animation-delay: -3s; animation-duration: 10s; }
        .float-orb:nth-child(3) { animation-delay: -5s; animation-duration: 12s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        .form-input {
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .form-input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .card-enter {
            animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .deco-line {
            background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
            height: 1px;
        }

        .dot-grid {
            background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .hero-bg {
            background: linear-gradient(135deg, #1e3a5f 0%, #2d1b69 40%, #1a1a2e 100%);
            position: relative;
            overflow: hidden;
        }
        .hero-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
        }

        .hero-icon {
            animation: floatIcon 6s ease-in-out infinite;
        }
        .hero-icon:nth-child(2) { animation-delay: -2s; }
        .hero-icon:nth-child(3) { animation-delay: -4s; }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(3deg); }
        }

        .pwd-toggle { transition: color 0.15s ease; }
        .pwd-toggle:hover { color: #3b82f6; }

        .spinner { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 密码强度条 */
        .strength-bar {
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        /* 弹跳入场 */
        .shake {
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* 勾号动画 */
        .check-draw {
            stroke-dasharray: 30;
            stroke-dashoffset: 30;
            animation: drawCheck 0.4s ease 0.1s forwards;
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="min-h-screen flex">
        <!-- 左侧装饰区 - 桌面端显示 -->
        <div class="hidden lg:flex lg:w-[480px] xl:w-[560px] hero-bg flex-col justify-between p-10 xl:p-12 relative shrink-0">
            <div class="float-orb w-64 h-64 bg-purple-500/20 top-10 -left-20"></div>
            <div class="float-orb w-48 h-48 bg-pink-500/20 bottom-20 right-10"></div>
            <div class="float-orb w-32 h-32 bg-blue-500/15 top-1/2 left-1/3"></div>

            <!-- 顶部品牌 -->
            <div class="relative z-10">
                <div class="flex items-center gap-3">
                    <div class="w-11 h-11 rounded-2xl bg-white/10 backdrop-blur-sm border border-white/20 flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                        </svg>
                    </div>
                    <span class="text-white font-extrabold text-xl tracking-tight">NDisk</span>
                </div>
            </div>

            <!-- 中间内容 -->
            <div class="relative z-10 space-y-8">
                <div>
                    <h2 class="text-4xl xl:text-5xl font-black text-white leading-tight">
                        开启你的<br>
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-300 via-pink-300 to-orange-300">云端之旅</span>
                    </h2>
                    <p class="mt-4 text-lg text-white/60 font-medium leading-relaxed max-w-sm">
                        注册 NDisk，获取专属个人云盘，畅享无限存储与分享
                    </p>
                </div>

                <!-- 特性列表 -->
                <div class="space-y-4">
                    <div class="flex items-center gap-3 text-white/70">
                        <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-purple-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold">账号安全，数据加密存储</span>
                    </div>
                    <div class="flex items-center gap-3 text-white/70">
                        <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-pink-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold">断点续传，上传不中断</span>
                    </div>
                    <div class="flex items-center gap-3 text-white/70">
                        <div class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center shrink-0">
                            <svg class="w-4 h-4 text-orange-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                            </svg>
                        </div>
                        <span class="text-sm font-semibold">一键分享，密码保护</span>
                    </div>
                </div>
            </div>

            <!-- 底部装饰 -->
            <div class="relative z-10 flex items-center gap-6">
                <div class="hero-icon w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center">
                    <svg class="w-6 h-6 text-purple-300/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
                    </svg>
                </div>
                <div class="hero-icon w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center">
                    <svg class="w-6 h-6 text-pink-300/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                </div>
                <div class="hero-icon w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center">
                    <svg class="w-6 h-6 text-orange-300/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- 右侧表单区 -->
        <div class="flex-1 flex items-center justify-center p-6 sm:p-8 lg:p-12 dot-grid relative">
            <div class="lg:hidden float-orb w-48 h-48 bg-purple-400/20 -top-10 -right-10"></div>
            <div class="lg:hidden float-orb w-36 h-36 bg-pink-400/15 bottom-10 -left-10"></div>

            <div class="w-full max-w-md relative z-10">
                <!-- 移动端品牌 -->
                <div class="lg:hidden flex items-center justify-center gap-3 mb-8">
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center shadow-lg">
                        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
                        </svg>
                    </div>
                    <span class="font-black text-2xl text-gray-900 tracking-tight">NDisk</span>
                </div>

                <!-- 注册卡片 -->
                <div class="card-enter bg-white rounded-3xl shadow-xl border-2 border-gray-100 p-8 sm:p-10">
                    <!-- 标题 -->
                    <div class="text-center mb-8">
                        <h1 class="text-2xl sm:text-3xl font-black text-gray-900">创建账号</h1>
                        <p class="mt-2 text-gray-500 font-medium">注册 NDisk，开始你的云端体验</p>
                    </div>

                    <!-- 错误提示 -->
                    <div id="error-message" class="hidden mb-6 p-4 rounded-xl bg-red-50 border-2 border-red-200 text-red-700 text-sm font-semibold flex items-start gap-2" role="alert">
                        <svg class="w-5 h-5 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
                        </svg>
                        <span id="error-text"></span>
                    </div>

                    <!-- 成功提示 -->
                    <div id="success-message" class="hidden mb-6 p-4 rounded-xl bg-green-50 border-2 border-green-200 text-green-700 text-sm font-semibold flex items-start gap-2" role="alert">
                        <svg class="w-5 h-5 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
                        </svg>
                        <span id="success-text"></span>
                    </div>

                    <!-- 注册表单 -->
                    <form id="register-form" class="space-y-5">
                        <!-- 用户名 -->
                        <div>
                            <label for="username" class="block text-sm font-bold text-gray-700 mb-2">用户名</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                                    </svg>
                                </div>
                                <input type="text" id="username" name="username" required
                                    placeholder="请输入用户名…"
                                    autocomplete="username"
                                    spellcheck="false"
                                    class="form-input w-full pl-12 pr-4 py-3.5 border-2 border-gray-200 rounded-xl font-semibold text-gray-900 placeholder-gray-400 focus-ring">
                            </div>
                            <p class="mt-1.5 text-xs text-gray-400 font-medium">用户名将用于登录，注册后不可修改</p>
                        </div>

                        <!-- 密码 -->
                        <div>
                            <label for="password" class="block text-sm font-bold text-gray-700 mb-2">密码</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                                    </svg>
                                </div>
                                <input type="password" id="password" name="password" required
                                    placeholder="请设置密码…"
                                    autocomplete="new-password"
                                    class="form-input w-full pl-12 pr-12 py-3.5 border-2 border-gray-200 rounded-xl font-semibold text-gray-900 placeholder-gray-400 focus-ring">
                                <button type="button" onclick="togglePassword('password', 'pwd-eye-off', 'pwd-eye-on')" class="absolute inset-y-0 right-0 pr-4 flex items-center pwd-toggle text-gray-400 focus-ring rounded-lg" aria-label="显示/隐藏密码">
                                    <svg id="pwd-eye-off" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                    </svg>
                                    <svg id="pwd-eye-on" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </div>
                            <!-- 密码强度指示器 -->
                            <div class="mt-2">
                                <div class="flex items-center gap-2">
                                    <div class="flex-1 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                        <div id="strength-bar" class="strength-bar h-full w-0 rounded-full"></div>
                                    </div>
                                    <span id="strength-text" class="text-xs font-bold text-gray-400 w-12 text-right"></span>
                                </div>
                            </div>
                        </div>

                        <!-- 确认密码 -->
                        <div>
                            <label for="confirm-password" class="block text-sm font-bold text-gray-700 mb-2">确认密码</label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <svg class="w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                                    </svg>
                                </div>
                                <input type="password" id="confirm-password" name="confirm-password" required
                                    placeholder="请再次输入密码…"
                                    autocomplete="new-password"
                                    class="form-input w-full pl-12 pr-12 py-3.5 border-2 border-gray-200 rounded-xl font-semibold text-gray-900 placeholder-gray-400 focus-ring">
                                <button type="button" onclick="togglePassword('confirm-password', 'cpwd-eye-off', 'cpwd-eye-on')" class="absolute inset-y-0 right-0 pr-4 flex items-center pwd-toggle text-gray-400 focus-ring rounded-lg" aria-label="显示/隐藏密码">
                                    <svg id="cpwd-eye-off" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                                    </svg>
                                    <svg id="cpwd-eye-on" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                                    </svg>
                                </button>
                            </div>
                            <!-- 密码匹配提示 -->
                            <p id="password-match-hint" class="hidden mt-1.5 text-xs font-semibold flex items-center gap-1"></p>
                        </div>

                        <!-- 注册按钮 -->
                        <button type="submit" id="register-btn"
                            class="btn-bounce w-full py-3.5 px-6 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold text-base rounded-xl shadow-lg focus-ring flex items-center justify-center gap-2 mt-2">
                            <span id="register-btn-text">注册</span>
                            <svg id="register-spinner" class="hidden w-5 h-5 spinner" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </form>

                    <!-- 分隔线 -->
                    <div class="flex items-center gap-4 my-6">
                        <div class="flex-1 deco-line"></div>
                        <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">或</span>
                        <div class="flex-1 deco-line"></div>
                    </div>

                    <!-- 登录链接 -->
                    <p class="text-center text-sm text-gray-500 font-medium">
                        已有账号？
                        <a href="/login" class="font-bold text-blue-600 hover:text-purple-600 transition-colors focus-ring rounded px-1">
                            立即登录
                        </a>
                    </p>
                </div>

                <!-- 底部版权 -->
                <p class="text-center text-xs text-gray-400 font-medium mt-6">
                    NDisk &copy; 2025 &middot; 安全便捷的文件分享服务
                </p>
            </div>
        </div>
    </div>

    <script>
        // 密码显示/隐藏
        function togglePassword(inputId, eyeOffId, eyeOnId) {
            var input = document.getElementById(inputId);
            var eyeOff = document.getElementById(eyeOffId);
            var eyeOn = document.getElementById(eyeOnId);

            if (input.type === 'password') {
                input.type = 'text';
                eyeOff.classList.add('hidden');
                eyeOn.classList.remove('hidden');
            } else {
                input.type = 'password';
                eyeOff.classList.remove('hidden');
                eyeOn.classList.add('hidden');
            }
        }

        // 显示/隐藏消息
        function showError(msg) {
            var el = document.getElementById('error-message');
            document.getElementById('error-text').textContent = msg;
            el.classList.remove('hidden');
            el.classList.add('shake');
            setTimeout(function() { el.classList.remove('shake'); }, 400);
        }

        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }

        function showSuccess(msg) {
            var el = document.getElementById('success-message');
            document.getElementById('success-text').textContent = msg;
            el.classList.remove('hidden');
        }

        function hideSuccess() {
            document.getElementById('success-message').classList.add('hidden');
        }

        // 设置加载状态
        function setLoading(loading) {
            var btn = document.getElementById('register-btn');
            var text = document.getElementById('register-btn-text');
            var spinner = document.getElementById('register-spinner');

            if (loading) {
                btn.disabled = true;
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                text.textContent = '注册中…';
                spinner.classList.remove('hidden');
            } else {
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
                text.textContent = '注册';
                spinner.classList.add('hidden');
            }
        }

        // 密码强度检测
        function checkStrength(password) {
            var score = 0;
            if (password.length >= 6) score++;
            if (password.length >= 10) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            return score;
        }

        function updateStrengthUI(score) {
            var bar = document.getElementById('strength-bar');
            var text = document.getElementById('strength-text');

            var configs = [
                { width: '0%', color: '#e5e7eb', text: '', textColor: 'text-gray-400' },
                { width: '20%', color: '#ef4444', text: '很弱', textColor: 'text-red-500' },
                { width: '40%', color: '#f97316', text: '较弱', textColor: 'text-orange-500' },
                { width: '60%', color: '#eab308', text: '一般', textColor: 'text-yellow-500' },
                { width: '80%', color: '#22c55e', text: '较强', textColor: 'text-green-500' },
                { width: '100%', color: '#10b981', text: '很强', textColor: 'text-emerald-500' },
            ];

            var cfg = configs[score] || configs[0];
            bar.style.width = cfg.width;
            bar.style.backgroundColor = cfg.color;
            text.textContent = cfg.text;
            text.className = 'text-xs font-bold w-12 text-right ' + cfg.textColor;
        }

        document.getElementById('password').addEventListener('input', function() {
            var score = checkStrength(this.value);
            updateStrengthUI(this.value ? score : 0);
            checkPasswordMatch();
        });

        // 密码匹配检测
        function checkPasswordMatch() {
            var pwd = document.getElementById('password').value;
            var confirm = document.getElementById('confirm-password').value;
            var hint = document.getElementById('password-match-hint');

            if (!confirm) {
                hint.classList.add('hidden');
                return;
            }

            hint.classList.remove('hidden');
            if (pwd === confirm) {
                hint.innerHTML = '<svg class="w-3.5 h-3.5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>';
                hint.className = 'mt-1.5 text-xs font-semibold flex items-center gap-1 text-green-600';
                hint.appendChild(document.createTextNode('密码匹配'));
            } else {
                hint.innerHTML = '<svg class="w-3.5 h-3.5 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>';
                hint.className = 'mt-1.5 text-xs font-semibold flex items-center gap-1 text-red-500';
                hint.appendChild(document.createTextNode('密码不一致'));
            }
        }

        document.getElementById('confirm-password').addEventListener('input', checkPasswordMatch);

        // 表单提交
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            hideError();
            hideSuccess();

            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value;
            var confirmPassword = document.getElementById('confirm-password').value;

            if (username.length < 3) {
                showError('用户名至少需要 3 个字符');
                return;
            }

            if (password.length < 8) {
                showError('密码至少需要 8 个字符');
                return;
            }

            if (password.length > 128) {
                showError('密码最多 128 个字符');
                return;
            }

            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            setLoading(true);

            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.id || data.username) {
                    showSuccess('注册成功！即将跳转到登录页面…');
                    document.getElementById('register-form').reset();
                    updateStrengthUI(0);
                    document.getElementById('password-match-hint').classList.add('hidden');
                    setTimeout(function() {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    showError(data.error || '注册失败，请重试');
                    setLoading(false);
                }
            })
            .catch(function() {
                showError('网络错误，请检查连接后重试');
                setLoading(false);
            });
        });

        // 输入时隐藏错误
        document.getElementById('username').addEventListener('input', hideError);
        document.getElementById('password').addEventListener('input', hideError);
        document.getElementById('confirm-password').addEventListener('input', hideError);

        // 自动聚焦用户名
        document.getElementById('username').focus();
    </script>
</body>
</html>
{{end}}
