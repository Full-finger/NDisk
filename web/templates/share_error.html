{{define "share_error"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f8fafc">
    <title>{{.title}} - NDisk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Nunito', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @media (prefers-reduced-motion: reduce) {
            *, ::before, ::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        * { font-family: 'Nunito', sans-serif; }

        .float-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatOrb 10s ease-in-out infinite;
        }
        .float-orb:nth-child(2) { animation-delay: -4s; animation-duration: 13s; }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(15px, -10px) scale(1.04); }
        }

        .dot-grid {
            background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .card-enter {
            animation: cardEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes cardEnter {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* 图标弹入 */
        .icon-pop {
            animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }
        @keyframes iconPop {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 警告图标抖动 */
        .icon-shake {
            animation: iconShake 0.6s ease 0.5s;
        }
        @keyframes iconShake {
            0%, 100% { transform: rotate(0deg); }
            20% { transform: rotate(-8deg); }
            40% { transform: rotate(8deg); }
            60% { transform: rotate(-4deg); }
            80% { transform: rotate(4deg); }
        }

        .btn-bounce {
            transition: transform 0.15s ease, box-shadow 0.2s ease;
        }
        .btn-bounce:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px -5px rgba(0, 0, 0, 0.15);
        }
        .btn-bounce:active {
            transform: scale(0.98);
        }

        .focus-ring:focus-visible {
            outline: 3px solid #3b82f6;
            outline-offset: 2px;
        }

        .brand-link {
            transition: opacity 0.2s ease;
        }
        .brand-link:hover { opacity: 1; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen dot-grid relative overflow-hidden">
    <!-- 装饰 -->
    <div class="float-orb w-72 h-72 bg-red-400/20 -top-20 -right-20 pointer-events-none"></div>
    <div class="float-orb w-56 h-56 bg-orange-400/15 bottom-10 -left-16 pointer-events-none"></div>

    <div class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-6 relative z-10">
        <!-- 品牌 -->
        <div class="card-enter mb-6 flex items-center gap-2.5 opacity-60 hover:opacity-100 transition-opacity">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center shadow-md">
                <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
            </div>
            <span class="text-sm font-bold text-gray-500 tracking-wide">NDisk</span>
        </div>

        <!-- 错误卡片 -->
        <div class="card-enter bg-white rounded-3xl shadow-xl border-2 border-gray-100 w-full max-w-md overflow-hidden" style="animation-delay: 0.1s;">
            <!-- 顶部红色条 -->
            <div class="h-1.5 bg-gradient-to-r from-red-400 via-orange-400 to-red-400"></div>

            <div class="p-8 sm:p-10 text-center">
                <!-- 错误图标 -->
                <div class="icon-pop icon-shake inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-gradient-to-br from-red-50 to-orange-50 border-2 border-red-100 mb-6">
                    <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                    </svg>
                </div>

                <!-- 标题 -->
                <h1 class="text-xl sm:text-2xl font-extrabold text-gray-900 mb-2">{{.title}}</h1>

                <!-- 错误描述 -->
                <p class="text-gray-500 font-medium leading-relaxed mb-8">{{.error}}</p>

                <!-- 操作按钮 -->
                <a href="/" class="btn-bounce inline-flex items-center justify-center px-6 py-3 bg-gradient-to-r from-blue-500 to-purple-500 text-white font-bold rounded-xl shadow-lg focus-ring gap-2">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    返回首页
                </a>
            </div>
        </div>

        <!-- 底部 -->
        <div class="card-enter mt-6 flex items-center gap-2 opacity-40 hover:opacity-70 transition-opacity" style="animation-delay: 0.2s;">
            <div class="w-5 h-5 rounded-md bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center">
                <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
                </svg>
            </div>
            <span class="text-xs font-bold text-gray-400"><a href="https://github.com/Full-finger/NDisk" target="_blank" style="color: inherit; text-decoration: none;">NDisk</a> &middot; 安全分享</span>
        </div>
    </div>
</body>
</html>
{{end}}
