{{define "share"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.project_name}} - NDisk 分享</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
        <h1 class="text-xl font-bold text-gray-800 mb-2">{{.project_name}}</h1>
        <div class="mb-4 text-sm text-gray-600">
            <p>文件名：{{.item_name}}</p>
            {{if .is_folder}}
            <p>类型：文件夹</p>
            {{else}}
            <p>大小：{{.item_size}} bytes</p>
            {{end}}
        </div>

        {{if .needs_password}}
        <!-- 需要密码 -->
        <div id="password-view">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">此分享需要密码访问</label>
                <input type="text" id="share-password" placeholder="请输入密码"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <p id="password-error" class="hidden mt-2 text-sm text-red-600">密码错误</p>
            </div>
            <button onclick="verifyPassword()"
                class="w-full px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">验证</button>
        </div>
        <div id="download-view" class="hidden">
            <button onclick="downloadShare()"
                class="w-full px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">下载</button>
        </div>
        {{else}}
        <!-- 无需密码 -->
        <button onclick="downloadShare()"
            class="w-full px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">下载</button>
        {{end}}
    </div>

    <script>
        var shareToken = "{{.share_token}}";
        var passwordVerified = false;
        var enteredPassword = "";

        function verifyPassword() {
            var password = document.getElementById("share-password").value;
            if (!password) return;

            fetch("/api/shares/" + shareToken + "/verify", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ password: password })
            }).then(function(res) {
                return res.json().then(function(data) { return { ok: res.ok, data: data }; });
            }).then(function(result) {
                if (result.ok) {
                    passwordVerified = true;
                    enteredPassword = document.getElementById("share-password").value;
                    document.getElementById("password-view").classList.add("hidden");
                    document.getElementById("download-view").classList.remove("hidden");
                } else {
                    var errEl = document.getElementById("password-error");
                    errEl.textContent = result.data.error || "密码错误";
                    errEl.classList.remove("hidden");
                }
            }).catch(function() {
                alert("网络错误，请重试");
            });
        }

        function downloadShare() {
            var url = "/api/shares/" + shareToken + "/download";
            if (enteredPassword) {
                url += "?password=" + encodeURIComponent(enteredPassword);
            }
            window.location.href = url;
        }
    </script>
</body>
</html>
{{end}}

{{define "share_error"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - NDisk</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md text-center">
        <svg class="mx-auto h-12 w-12 text-red-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
        </svg>
        <h1 class="text-xl font-bold text-gray-800 mb-2">{{.title}}</h1>
        <p class="text-gray-600">{{.error}}</p>
    </div>
</body>
</html>
{{end}}
