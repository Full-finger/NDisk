# NDisk 配置文件示例
# 复制此文件为 config.toml 并修改配置

# 服务端口
port = "8080"

# JWT 密钥
jwt_secret = "your-secret-key-change-in-production"

[database]
# 数据库驱动 (sqlite, mysql, postgres)
driver = "sqlite"
# 数据库连接字符串
dsn = "data/netdisk.db"

[storage]
# 文件存储路径
path = "data/uploads"

[nfs]
# 是否启用 NFS 协议支持
enabled = false
# NFS 服务端口
port = "2049"
# NFS 句柄签名密钥（生产环境请更换为随机字符串）
hmac_key = "change-this-to-a-random-secret"
